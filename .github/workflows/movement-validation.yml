name: Movement Engine Validation

on:
  pull_request:
    paths:
      - "app/api/movement/**"
      - "app/api/batch-scan/**"
      - "lib/movement/**"
      - "lib/server/adaptive-**"
      - "scripts/**"
      - "supabase/migrations/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/movement-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Movement invariants
        run: npm run test:movement

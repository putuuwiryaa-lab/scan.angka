name: Execute adaptive cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply cleanup script
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/remove-baseline.yml').read_text(encoding='utf-8').splitlines()
          start = next(index for index, line in enumerate(workflow) if line.strip() == "python <<'PY'")
          end = next(index for index in range(start + 1, len(workflow)) if workflow[index].strip() == 'PY')
          script = textwrap.dedent('\n'.join(workflow[start + 1:end]))
          exec(compile(script, 'remove-baseline.py', 'exec'), {'__name__': '__main__'})
          PY

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Movement invariants
        run: npm run test:movement

      - name: Commit validated cleanup
        shell: bash
        run: |
          rm .github/workflows/remove-baseline.yml
          rm .github/workflows/execute-baseline-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove baseline and always publish adaptive results"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
